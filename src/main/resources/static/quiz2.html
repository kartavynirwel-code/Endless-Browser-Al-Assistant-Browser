<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Java Basic Quiz</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    text-align:center;
}

.quiz-box{
    width:500px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input{
    padding:8px;
    width:200px;
    margin:10px;
}

button{
    padding:10px 20px;
    background:#007BFF;
    color:white;
    border:none;
    border-radius:5px;
}
</style>
</head>

<body>

<div class="quiz-box">
<h2>Java Basic Quiz</h2>

<form>

<p>1. Java is a ______ language.</p>
<input type="text" name="q1">

<p>2. JVM stands for Java Virtual ______.</p>
<input type="text" name="q2">

<p>3. Keyword used to inherit a class.</p>
<input type="text" name="q3">

<p>4. Entry point method of Java program.</p>
<input type="text" name="q4">

<p>5. Java is platform ______.</p>
<input type="text" name="q5">
        <br><br>
        <button type="button" onclick="checkQuiz2()">Submit Quiz</button>
    </form>
    <div id="result2" style="margin-top:20px; font-weight:bold; color:#007BFF;"></div>
</div>

<script>
function checkQuiz2() {
    let score = 0;
    const answers = {
        q1: "object oriented",
        q2: "machine",
        q3: "extends",
        q4: "main",
        q5: "independent"
    };

    for (let i = 1; i <= 5; i++) {
        let val = document.querySelector(`input[name="q${i}"]`).value.toLowerCase().trim();
        if (val.includes(answers[`q${i}`])) {
            score++;
        }
    }

    document.getElementById("result2").innerHTML = "Score: " + score + " / 5";
}
</script>
</html>
