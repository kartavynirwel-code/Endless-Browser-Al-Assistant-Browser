<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browser Test Quiz</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
            text-align:center;
            padding:40px;
        }

        .quiz-box{
            background:white;
            padding:20px;
            border-radius:10px;
            width:400px;
            margin:auto;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        button{
            padding:10px 20px;
            margin-top:15px;
            background:#007bff;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }

        .result{
            margin-top:20px;
            font-size:18px;
            font-weight:bold;
        }
    </style>
</head>

<body>

<div class="quiz-box">

    <h2>Simple Browser Test Quiz</h2>

    <form id="quizForm">

        <p>1. What does HTML stand for?</p>
        <label><input type="radio" name="q1" value="0"> Hyper Trainer Marking Language</label><br>
        <label><input type="radio" name="q1" value="1"> Hyper Text Markup Language</label><br>
        <label><input type="radio" name="q1" value="0"> Hyper Text Marketing Language</label>

        <p>2. Which language is used for styling web pages?</p>
        <label><input type="radio" name="q2" value="0"> HTML</label><br>
        <label><input type="radio" name="q2" value="1"> CSS</label><br>
        <label><input type="radio" name="q2" value="0"> Python</label>

        <p>3. Which language runs in the browser?</p>
        <label><input type="radio" name="q3" value="1"> JavaScript</label><br>
        <label><input type="radio" name="q3" value="0"> Java</label><br>
        <label><input type="radio" name="q3" value="0"> C++</label>

        <button type="button" onclick="checkScore()">Submit</button>

    </form>

    <div class="result" id="result"></div>

</div>

<script>

    function checkScore(){

        let score = 0;

        let q1 = document.querySelector('input[name="q1"]:checked');
        let q2 = document.querySelector('input[name="q2"]:checked');
        let q3 = document.querySelector('input[name="q3"]:checked');

        if(q1) score += parseInt(q1.value);
        if(q2) score += parseInt(q2.value);
        if(q3) score += parseInt(q3.value);

        document.getElementById("result").innerHTML =
            "Your Score: " + score + " / 3";

    }

</script>

</body>
</html>
