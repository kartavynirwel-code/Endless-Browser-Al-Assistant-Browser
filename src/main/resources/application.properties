server.port=8082
spring.application.name=endless

# MySQL (Primary)
spring.datasource.url=jdbc:mysql://localhost:3306/EndlessBrowser?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC&connectTimeout=5000
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update

# H2 In-Memory Database (Fallback)
# To use H2, uncomment these and comment the MySQL section above
# spring.datasource.url=jdbc:h2:mem:gravitydb;DB_CLOSE_DELAY=-1
# spring.datasource.driver-class-name=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=
