# H2 In-Memory Database (Fallback/Manual setup)
# spring.datasource.url=jdbc:h2:mem:gravitydb;DB_CLOSE_DELAY=-1
# spring.datasource.driver-class-name=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=
# spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# spring.h2.console.enabled=true
# spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true


server.tomcat.max-http-form-post-size=50MB
server.tomcat.max-swallow-size=50MB
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Spring AI Ollama
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.model=phi3:mini
spring.ai.ollama.chat.options.temperature=0.5
spring.ai.ollama.chat.options.num-predict=2000
spring.ai.ollama.chat.options.num-gpu=0
